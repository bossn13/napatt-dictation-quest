<!doctype html><html lang="th"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Word Catcher AR | P4</title><style>
:root{--ink:#182033;--paper:#fbf6ea;--violet:#744dd2;--sun:#ffd161;--mint:#72d8a4}*{box-sizing:border-box}body{margin:0;background:var(--paper);font-family:ui-rounded,"Noto Sans Thai",system-ui;color:var(--ink)}button{font:inherit;cursor:pointer}.app{width:min(980px,100%);min-height:100dvh;margin:auto;padding:18px}.bar{display:flex;justify-content:space-between;align-items:center;font-weight:900}.logo{font-size:1.2rem}.logo i{font-style:normal;background:var(--violet);color:white;border-radius:10px;padding:7px;margin-right:7px}.score{padding:8px 12px;background:#ffebba;border-radius:11px}.home{max-width:760px;margin:clamp(35px,8vh,90px) auto}.tag{display:inline-block;background:#e9deff;color:#56399c;padding:6px 11px;border-radius:20px;font-size:.8rem;font-weight:900}.home h1{font-size:clamp(3rem,9vw,6.5rem);letter-spacing:-.08em;line-height:.86;margin:20px 0}.home h1 b{color:var(--violet)}.home p{max-width:52ch;line-height:1.6}.subjects{display:flex;flex-wrap:wrap;gap:8px;margin:25px 0}.subject{border:1px solid #b5bed0;border-radius:999px;padding:9px 12px;background:transparent;font-weight:800}.subject.active{background:var(--ink);color:white}.start{border:2px solid var(--ink);border-radius:15px;padding:14px 19px;background:var(--sun);box-shadow:4px 5px 0 var(--ink);font-weight:950}.note{font-size:.83rem;color:#546078}.game{position:relative;height:calc(100dvh - 72px);min-height:560px;overflow:hidden;border:2px solid var(--ink);border-radius:22px;background:radial-gradient(circle at 50% 15%,#415d99,#182033 65%)}video,canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}video{transform:scaleX(-1);opacity:.75}.hud{position:absolute;z-index:3;inset:14px 14px auto;display:flex;justify-content:space-between}.badge,.exit{padding:8px 11px;border-radius:11px;background:#182033cc;color:white;border:1px solid #ffffff55;font-weight:900}.exit.hand-hover,.listen.hand-hover{outline:4px solid var(--sun);transform:scale(1.08)}.prompt{position:absolute;z-index:3;top:22%;left:10%;right:10%;text-align:center;color:white;text-shadow:0 2px 10px #000}.label{font-size:.78rem;color:var(--sun);font-weight:950;letter-spacing:.12em}.prompt h2{font-size:clamp(1.7rem,5vw,3rem);line-height:1.18;margin:10px auto}.listen{border:0;border-radius:99px;padding:9px 13px;font-weight:900;transition:.15s}.tip{position:absolute;z-index:3;bottom:110px;left:50%;transform:translateX(-50%);color:white;background:#182033bb;border-radius:99px;padding:7px 12px;white-space:nowrap;font-size:.8rem}.choices{position:absolute;z-index:4;left:12px;right:12px;bottom:max(14px,env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.choice{min-height:70px;border:2px solid #ffffffbb;border-radius:16px;background:#182033cc;color:white;font-weight:950;font-size:clamp(.8rem,2.6vw,1rem);transition:.15s}.choice.hand-hover{transform:translateY(-6px) scale(1.03);background:var(--violet);border-color:var(--sun)}.choice.good{background:#2c976b}.choice.bad{background:#c95e54}.hidden{display:none}@media(max-width:520px){.game{height:calc(100dvh - 68px)}.choices{grid-template-columns:1fr 1fr}.choices .choice:last-child{grid-column:1/3}.tip{bottom:180px}.home h1{font-size:3.4rem}}
</style><main class="app"><header class="bar"><div class="logo"><i>✦</i>Word Catcher AR</div><div class="score" id="score">ดาว 0</div></header><section id="home" class="home"><span class="tag">DICTATION V2 · SPIDER CURSOR</span><h1>จับคำให้ได้<br><b>ก่อนมันหายไป!</b></h1><p>อ่าน English meaning แล้วใช้ปลายนิ้วชี้ค้างเหนือคำตอบ หรือแตะจอได้ทันที</p><div id="subjects" class="subjects"></div><button id="start" class="start">เริ่มภารกิจด้วยกล้อง 📷</button><p class="note">คำแปลไทยจะไม่แสดงในหน้า quiz · ปุ่มฟังและออกใช้มือค้างเลือกได้</p></section><section id="game" class="game hidden"><video id="cam" playsinline muted></video><canvas id="draw"></canvas><div class="hud"><span class="badge" id="level">ด่าน 1</span><button class="exit" data-hand="exit" id="exit">ออก</button></div><div class="prompt"><span class="label" id="subjectLabel"></span><h2 id="meaning"></h2><button class="listen" data-hand="listen" id="listen">🔊 ฟังคำศัพท์</button></div><div class="tip" id="tip">ชี้แมงมุมค้างบนคำตอบ</div><div class="choices" id="choices"></div></section></main><script type="module">
import{HandLandmarker,FilesetResolver}from'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14';
const raw={english:['climate|The usual weather in a place.','influence|To change the way someone thinks or behaves.','artificial|Not natural; made by people.','extinction|When every animal of one kind dies and none are left.','marsupial|An animal that carries its baby in a pouch.','carnivorous|An animal that eats meat.','instrument|An object used for making music.','belong|To be owned by someone.','look after|To take care of someone or something.','tilt|To move something so it is not straight.'],math:['increasing order|Numbers arranged from least to greatest.','factor|A number that divides another number without a remainder.','common multiple|A multiple shared by two or more numbers.','prime number|A number greater than 1 with only 1 and itself as factors.','improper fraction|A fraction with a numerator greater than or equal to its denominator.','vertex|A point where lines meet to form an angle.','perpendicular|Meeting at a right angle.','reflex angle|An angle greater than 180 degrees but less than 360 degrees.','numerator|The top number in a fraction.','dividend|The number to be divided.'],social:['geographical tool|A tool used to study and understand the Earth.','aerial photograph|A photo of the Earth taken from an airplane.','satellite image|A picture of the Earth taken by a satellite.','axis|An imaginary line through the Earth from pole to pole.','leap year|A year with 366 days, including February 29.','weather|The condition of the air outside at a certain time.','altitude|The height of a place above sea level.','humidity|The amount of water vapor in the air.','agriculture|Growing crops and raising animals for food.','suburb|An area just outside a city or town.'],science:['resemble|To look like or be similar to something.','classification|Grouping things by type or similarity.','vertebrate|An animal with a backbone.','exoskeleton|A hard outer covering that protects an animal.','seedling|A young plant that has started to grow.','rust|A reddish-brown substance that forms on iron.','insoluble|Not able to dissolve in a liquid.','strength|The ability to resist being broken by a force.','kinetic energy|Energy an object has because it is moving.','expansion|The process of becoming greater in size.'],sgi:['order|The arrangement of steps.','breakdown|Breaking a problem into smaller parts.','script|Instructions that tell a computer what to do.','stage|The area where a Scratch project happens.','online community|A group of people who share ideas on the internet.','account|Information used to log in to a website or app.','text|Written words used to show information.','template|A ready-made design for creating something.','safety|Being protected from danger.','personal information|Information about you, like your name or address.']};const names={english:'Interactive English',math:'Mathematics IEP',social:'Social Studies IEP',science:'Science IEP',sgi:'SGI Computing Science'},all=Object.entries(raw).flatMap(([g,a])=>a.map(x=>{let[w,m]=x.split('|');return{g,w,m}})),q=s=>document.querySelector(s);let group='english',word,stars=0,round=0,hand,stream,last=0,hover='',since=0,locked=0;for(let[k,n]of Object.entries(names)){let b=document.createElement('button');b.className='subject'+(k===group?' active':'');b.textContent=n;b.onclick=()=>{group=k;document.querySelectorAll('.subject').forEach(x=>x.classList.toggle('active',x===b))};q('#subjects').append(b)}const sh=a=>[...a].sort(()=>Math.random()-.5),pick=a=>a[Math.random()*a.length|0];function next(){round++;word=pick(all.filter(x=>x.g===group));q('#subjectLabel').textContent=names[group].toUpperCase();q('#meaning').textContent=word.m;q('#level').textContent='ด่าน '+round;let opts=sh([word,...sh(all.filter(x=>x.w!==word.w)).slice(0,2)]);q('#choices').innerHTML='';opts.forEach(o=>{let b=document.createElement('button');b.className='choice';b.dataset.hand=o.w;b.textContent=o.w;b.onclick=()=>answer(o.w,b);q('#choices').append(b)})}function answer(v,b){if(!word||locked)return;locked=1;let ok=v===word.w;b.classList.add(ok?'good':'bad');if(ok){stars++;q('#score').textContent='ดาว '+stars}setTimeout(()=>{locked=0;next()},750)}function speak(){speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(word.w);u.lang='en-US';u.rate=.72;speechSynthesis.speak(u)}q('#listen').onclick=speak;q('#exit').onclick=stop;async function start(){q('#home').classList.add('hidden');q('#game').classList.remove('hidden');next();try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640}},audio:false});q('#cam').srcObject=stream;await q('#cam').play();await setup();requestAnimationFrame(loop)}catch(e){q('#tip').textContent='แตะคำตอบเพื่อเล่นได้เลย'}}function stop(){stream?.getTracks().forEach(t=>t.stop());q('#game').classList.add('hidden');q('#home').classList.remove('hidden');hand?.close?.()}q('#start').onclick=start;async function setup(){try{let v=await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm');hand=await HandLandmarker.createFromOptions(v,{baseOptions:{modelAssetPath:'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task'},runningMode:'VIDEO',numHands:1})}catch(e){q('#tip').textContent='แตะคำตอบเพื่อเล่นได้เลย'}}function spider(c,x,y){c.save();c.translate(x,y);c.strokeStyle='#181b2a';c.lineWidth=4;for(let a of[-2.5,-2.1,-1.05,-.65,.65,1.05,2.1,2.5]){c.beginPath();c.moveTo(0,0);c.lineTo(Math.cos(a)*22,Math.sin(a)*22);c.lineTo(Math.cos(a)*32,Math.sin(a)*31);c.stroke()}c.fillStyle='#5e42b6';c.beginPath();c.arc(0,0,15,0,7);c.fill();c.fillStyle='#f7d55c';c.beginPath();c.arc(5,-4,3,0,7);c.arc(5,5,3,0,7);c.fill();c.restore()}function loop(t){requestAnimationFrame(loop);if(!hand||q('#cam').readyState<2||t-last<66)return;last=t;let l=hand.detectForVideo(q('#cam'),t).landmarks?.[0]?.[8],c=q('#draw'),x;if(!l)return;c.width=innerWidth;c.height=innerHeight;x=(1-l.x)*innerWidth;let y=l.y*innerHeight,ctx=c.getContext('2d');ctx.clearRect(0,0,c.width,c.height);spider(ctx,x,y);let el=[...document.querySelectorAll('[data-hand]')].find(e=>{let r=e.getBoundingClientRect();return x>r.left&&x<r.right&&y>r.top&&y<r.bottom});document.querySelectorAll('[data-hand]').forEach(e=>e.classList.remove('hand-hover'));if(!el){hover='';return}el.classList.add('hand-hover');let id=el.dataset.hand;if(id!==hover){hover=id;since=t}else if(t-since>650&&t>locked){locked=t+1000;hover='';if(id==='listen')speak();else if(id==='exit')stop();else answer(id,el)}}
answer=function(v,b){if(!word||locked===1)return;locked=1;let ok=v===word.w;b.classList.add(ok?'good':'bad');if(ok){stars++;q('#score').textContent='ดาว '+stars}setTimeout(()=>{locked=0;next()},750)}
</script></html>
