<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dictation Quest | P4 Midterm</title>
  <style>
    :root { --ink: oklch(26% .035 255); --paper: oklch(98% .012 85); --violet: oklch(51% .17 290); --sky: oklch(68% .11 215); --sun: oklch(82% .14 84); --mint: oklch(80% .10 158); --coral: oklch(69% .15 32); --line: oklch(82% .025 260); --shadow: 0 16px 34px oklch(35% .04 255 / .14); }
    * { box-sizing: border-box; }
    body { margin: 0; color: var(--ink); background: radial-gradient(circle at 7% 2%, oklch(94% .06 82), transparent 24rem), radial-gradient(circle at 98% 20%, oklch(92% .055 205), transparent 24rem), var(--paper); font-family: ui-rounded, "SF Pro Rounded", "Noto Sans Thai", system-ui, sans-serif; }
    button { font: inherit; cursor: pointer; }
    .shell { width: min(1120px, calc(100% - 28px)); margin: auto; padding: 20px 0 52px; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 18px; padding: 12px 0 22px; }
    .brand { display: flex; align-items: center; gap: 12px; font-weight: 850; letter-spacing: -.02em; }
    .brand-mark { display:grid; place-items:center; width:42px; height:42px; border-radius: 15px; background: var(--violet); color: oklch(98% .01 300); box-shadow: 0 6px 0 oklch(38% .13 290); font-size: 1.35rem; }
    .progress { text-align:right; font-size:.85rem; font-weight:750; }
    .meter { width:142px; height:9px; overflow:hidden; margin-top:5px; border-radius:99px; background: oklch(89% .02 260); } .meter > i { display:block; height:100%; border-radius:inherit; background: var(--violet); transition:width .3s ease-out; }
    .hero { display:grid; grid-template-columns: 1.4fr .9fr; gap: 22px; align-items:stretch; margin-bottom:22px; }
    .hero-copy { padding: clamp(23px, 5vw, 48px); border: 2px solid var(--ink); border-radius: 30px; background: oklch(94% .075 83); box-shadow: 8px 8px 0 var(--ink); }
    h1 { margin:0; font-size:clamp(2rem, 5.5vw, 4.55rem); line-height:.98; letter-spacing:-.065em; } h1 strong { color:var(--violet); }
    .hero-copy p { max-width:53ch; margin:20px 0 0; font-size:1.04rem; line-height:1.65; }
    .today { display:flex; gap:12px; align-items:center; padding:18px; border-radius:28px; background:var(--ink); color:oklch(97% .01 250); box-shadow:var(--shadow); }
    .today .day { display:grid; flex:0 0 60px; place-items:center; width:60px;height:60px;border-radius:20px; background:var(--sun); color:var(--ink); font-weight:900; font-size:1.45rem; }.today p{margin:4px 0 0;font-size:.88rem;line-height:1.45}.today b{font-size:1rem}
    .toolbar { display:flex; flex-wrap:wrap; gap:9px; margin: 0 0 20px; }.pill { padding:9px 13px; border:1.5px solid var(--line); border-radius:999px; background:oklch(100% .005 100 / .65); color:var(--ink); font-size:.89rem; font-weight:750; }.pill.active,.pill:hover { border-color:var(--violet); background:oklch(94% .05 290); color:oklch(39% .15 290); }
    .view { min-height: 520px; }.section-title { display:flex; justify-content:space-between; gap:16px; align-items:end; margin: 10px 0 16px; }.section-title h2 { margin:0; font-size:1.45rem; letter-spacing:-.035em; }.section-title p { margin:0; color:oklch(44% .025 255); font-size:.91rem; }
    .subject-grid { display:grid; grid-template-columns:repeat(5, minmax(0, 1fr)); gap:12px; }.subject { min-width:0; min-height:155px; padding:16px; border:2px solid var(--ink); border-radius:23px; background:var(--tint); box-shadow: 4px 5px 0 var(--ink); text-align:left; transition:transform .18s ease-out; }.subject:hover{transform:translateY(-4px)}.subject .icon{font-size:2rem}.subject b{display:block;overflow-wrap:anywhere;margin-top:20px;font-size:.93rem;line-height:1.1}.subject small{display:block;margin-top:7px;color:oklch(35% .02 255)}
    .study-layout { display:grid; grid-template-columns: 270px 1fr; gap:20px; }.word-list { padding:10px; border:1.5px solid var(--line); border-radius:23px; background:oklch(100% .008 85 / .66); }.word-list button { display:flex; width:100%; gap:10px; align-items:center; padding:9px 10px; border:0; border-radius:12px; background:transparent; color:inherit; text-align:left; font-size:.9rem; }.word-list button.active,.word-list button:hover { background:oklch(93% .055 290); color:oklch(37% .14 290); font-weight:800; }.word-list em{font-style:normal;color:var(--violet);}
    .flashcard { position:relative; overflow:hidden; min-height:405px; padding:clamp(23px, 5vw, 50px); border:2px solid var(--ink); border-radius:30px; background:oklch(100% .008 90 / .7); box-shadow:var(--shadow); }.flashcard:after{content:"";position:absolute;width:240px;height:240px;right:-90px;bottom:-120px;border-radius:50%;background:var(--tint);z-index:0}.card-content{position:relative;z-index:1}.category{display:inline-flex;padding:6px 10px;border-radius:99px;background:var(--tint);font-size:.79rem;font-weight:850}.word{margin:17px 0 5px;font-size:clamp(2.2rem, 7vw, 5.3rem);line-height:1;letter-spacing:-.06em}.thai{font-size:1.2rem;font-weight:750;color:var(--coral)}.definition{max-width:48ch;margin:24px 0 0;font-size:1.13rem;line-height:1.6}.example{max-width:54ch;margin:12px 0 25px;padding:13px 15px;border-radius:14px;background:oklch(96% .015 260);font-size:.94rem;line-height:1.5}.card-actions{display:flex;flex-wrap:wrap;gap:9px}.btn{padding:11px 15px;border:2px solid var(--ink);border-radius:13px;background:var(--sun);color:var(--ink);font-weight:850;box-shadow:3px 3px 0 var(--ink)}.btn:hover{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--ink)}.btn.secondary{background:oklch(100% .006 80)}.btn.good{background:var(--mint)}
    .quiz { max-width:760px; margin:auto; padding:clamp(22px, 5vw, 42px); border:2px solid var(--ink); border-radius:30px; background:oklch(100% .008 90 / .74); box-shadow:var(--shadow); }.quiz-meta{display:flex;justify-content:space-between;font-size:.85rem;font-weight:800}.question-label{margin-top:27px;color:var(--violet);font-size:.88rem;font-weight:900;text-transform:uppercase;letter-spacing:.06em}.question{margin:8px 0 24px;font-size:clamp(1.48rem,4vw,2.35rem);line-height:1.24;letter-spacing:-.035em}.options{display:grid;gap:10px}.option{padding:15px 17px;border:1.5px solid var(--line);border-radius:15px;background:oklch(99% .01 90);color:var(--ink);font-size:1rem;text-align:left;transition:.15s ease-out}.option:hover:not(:disabled){border-color:var(--violet);background:oklch(95% .045 290)}.option.correct{border-color:oklch(55% .14 155);background:oklch(93% .07 155)}.option.wrong{border-color:oklch(60% .15 30);background:oklch(94% .055 30)}.feedback{min-height:28px;margin:18px 0 0;font-size:.95rem;font-weight:700;line-height:1.5}.quiz-foot{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:23px}.score{font-size:.9rem;font-weight:800}
    .review { display:grid; grid-template-columns:1.15fr .85fr; gap:20px; }.roadmap,.weak-box{padding:24px;border:1.5px solid var(--line);border-radius:25px;background:oklch(100% .008 90 / .7)}.roadmap h3,.weak-box h3{margin:0 0 15px;font-size:1.22rem}.days{display:grid;gap:10px}.day-row{display:grid;grid-template-columns:40px 1fr auto;gap:11px;align-items:center;padding:10px;border-radius:14px;background:oklch(96% .02 255)}.day-row b{display:grid;place-items:center;width:32px;height:32px;border-radius:10px;background:var(--sun)}.day-row strong{font-size:.93rem}.day-row span{font-size:.78rem;color:oklch(44% .025 255)}.weak-chips{display:flex;flex-wrap:wrap;gap:8px}.weak-chips button{padding:8px 10px;border:1.5px solid var(--coral);border-radius:12px;background:oklch(96% .05 32);font:inherit;font-size:.85rem;font-weight:750}.empty{color:oklch(43% .025 255);line-height:1.6}
    .results{text-align:center}.result-mark{font-size:4rem}.results h2{font-size:2rem;margin:5px 0}.result-score{font-size:3.5rem;font-weight:950;color:var(--violet);letter-spacing:-.08em}.results p{line-height:1.6}.results .btn{margin-top:14px}
    @media(max-width:850px){.subject-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.study-layout,.review{grid-template-columns:1fr}.word-list{display:flex;gap:5px;overflow:auto}.word-list button{width:auto;white-space:nowrap}.hero{grid-template-columns:1fr}.today{display:none}}@media(max-width:540px){.shell{width:min(100% - 20px,1120px)}header{padding-bottom:14px}.subject-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.subject{min-height:124px}.subject b{margin-top:12px}.progress{display:none}.word{font-size:2.65rem}.quiz{padding:23px 17px}.section-title{align-items:start;flex-direction:column;gap:4px}.flashcard{min-height:390px}.option{font-size:.94rem}}
  </style>
</head>
<body>
<main class="shell">
  <header><div class="brand"><span class="brand-mark">✦</span><span>Dictation Quest<br><small style="font-weight:650;color:oklch(45% .03 255)">P4 Midterm Vocabulary</small></span></div><div class="progress"><span id="progressText">0 / 50 คำที่จำแล้ว</span><div class="meter"><i id="progressBar"></i></div></div></header>
  <section class="hero"><div class="hero-copy"><h1>จำคำให้แม่น<br><strong>เล่นให้สนุก</strong></h1><p>ฝึกคำศัพท์ dictation 50 คำด้วยภาพ ความหมายภาษาอังกฤษ และโจทย์แบบเดียวกับข้อสอบจริง</p></div><aside class="today"><div class="day">7</div><div><b>แผน 7 วันก่อนสอบ</b><p>วันละ 10 คำ แล้วกลับมาทบทวนคำที่ยังไม่แม่น</p></div></aside></section>
  <nav class="toolbar" aria-label="เลือกโหมด"><button class="pill active" data-view="home">เริ่มเรียน</button><button class="pill" data-view="learn">บัตรคำศัพท์</button><button class="pill" data-view="meaning">เลือกความหมาย</button><button class="pill" data-view="fill">เติมคำในประโยค</button><button class="pill" data-view="review">แผนทบทวน</button></nav>
  <section id="app" class="view"></section>
</main>
<script>
const subjects = [
  {id:'english', name:'Interactive English', icon:'☀️', tint:'oklch(91% .07 85)', words:[
    ['climate','ภูมิอากาศ','The usual weather in a place.','Thailand has a hot climate.'],['influence','ส่งผลต่อ','To change the way someone thinks or behaves.','Friends can influence our choices.'],['artificial','เทียม / สังเคราะห์','Not natural; made by people.','This flower is artificial, not real.'],['extinction','การสูญพันธุ์','When every animal of one kind dies and none are left.','People work to stop the extinction of rare animals.'],['marsupial','สัตว์ที่มีกระเป๋าหน้าท้อง','An animal that carries its baby in a pouch.','A kangaroo is a marsupial.'],['carnivorous','ที่กินเนื้อเป็นอาหาร','An animal that eats meat.','A lion is a carnivorous animal.'],['instrument','เครื่องดนตรี','An object used for making music or doing a special job.','The guitar is my favorite instrument.'],['belong','เป็นของ','To be owned by someone.','This book belongs to my sister.'],['look after','ดูแล','To take care of someone or something.','I look after my little dog.'],['tilt','เอียง','To move something so it is not straight; to lean.','Tilt the bottle slowly to pour the water.']]},
  {id:'math', name:'Mathematics IEP', icon:'🔢', tint:'oklch(91% .075 22)', words:[
    ['increasing order','เรียงลำดับจากน้อยไปมาก','An arrangement of numbers from the least value to the greatest value.','Put 3, 8, and 12 in increasing order.'],['factor','ตัวประกอบ','A number that divides another number without a remainder.','Three is a factor of twelve.'],['common multiple','พหุคูณร่วม','A number that is a multiple of two or more numbers.','Twelve is a common multiple of 3 and 4.'],['prime number','จำนวนเฉพาะ','A number greater than 1 with only 1 and itself as factors.','Seven is a prime number.'],['improper fraction','เศษเกิน','A fraction whose numerator is greater than or equal to its denominator.','Five fourths is an improper fraction.'],['vertex','จุดยอดมุม','A point where lines or rays meet to form an angle.','Point B is the vertex of the angle.'],['perpendicular','ตั้งฉาก','Meeting at a right angle, exactly 90 degrees.','The two lines are perpendicular.'],['reflex angle','มุมกลับ','An angle greater than 180 degrees but less than 360 degrees.','The large angle is a reflex angle.'],['numerator','ตัวเศษ','The top number in a fraction.','In 3/5, the numerator is 3.'],['dividend','ตัวตั้งในการหาร','The number that is divided by another number.','In 24 ÷ 4, 24 is the dividend.']]},
  {id:'social', name:'Social Studies IEP', icon:'🌍', tint:'oklch(90% .07 185)', words:[
    ['geographical tool','เครื่องมือทางภูมิศาสตร์','A tool used to study and understand the Earth.','A map is a geographical tool.'],['aerial photograph','ภาพถ่ายทางอากาศ','A photo of the Earth taken from an airplane.','We studied an aerial photograph of the town.'],['satellite image','ภาพถ่ายจากดาวเทียม','A picture of the Earth taken by a satellite in space.','The satellite image shows the clouds.'],['axis','เส้นแกนโลก','An imaginary line through the Earth from the North Pole to the South Pole.','Earth spins on its axis.'],['leap year','ปีอธิกสุรทิน','A year with 366 days, including February 29.','February has 29 days in a leap year.'],['weather','สภาพอากาศ','The condition of the air outside at a certain time.','The weather is rainy today.'],['altitude','ระดับความสูง','The height of a place above sea level.','The plane is flying at a high altitude.'],['humidity','ความชื้น','The amount of water vapor in the air.','Humidity is high before a storm.'],['agriculture','เกษตรกรรม','Growing crops and raising animals for food.','Rice farming is an important kind of agriculture.'],['suburb','เขตชานเมือง','An area where people live just outside a city or town.','My aunt lives in a quiet suburb.']]},
  {id:'science', name:'Science IEP', icon:'🔬', tint:'oklch(91% .07 305)', words:[
    ['resemble','มีลักษณะคล้ายกัน','To look like or be similar to someone or something.','The twins resemble each other.'],['classification','การจำแนกประเภท','The process of grouping things by type or similarity.','We used classification to group the animals.'],['vertebrate','สัตว์มีกระดูกสันหลัง','An animal with a backbone.','A fish is a vertebrate.'],['exoskeleton','โครงร่างแข็งภายนอก','A hard outer covering that supports and protects an animal.','A crab has an exoskeleton.'],['seedling','ต้นอ่อน','A young plant that has just started to grow.','The seedling needs sunlight and water.'],['rust','สนิม','A reddish-brown substance that forms on iron and steel.','Rain can make an old bike rust.'],['insoluble','ไม่ละลาย','Not able to dissolve in a liquid.','Sand is insoluble in water.'],['strength','ความแข็งแรง','The ability to resist being moved or broken by a force.','The bridge needs strength to hold cars.'],['kinetic energy','พลังงานจลน์','Energy an object has because it is moving.','A rolling ball has kinetic energy.'],['expansion','การขยายออก','The process of becoming greater in size or amount.','Heat causes the expansion of metal.']]},
  {id:'sgi', name:'SGI Computing Science', icon:'💻', tint:'oklch(90% .06 225)', words:[
    ['order','ลำดับ','The arrangement of steps.','Put the instructions in the correct order.'],['breakdown','แยกย่อย','To break a problem into smaller parts.','A breakdown makes a big problem easier.'],['script','ชุดคำสั่ง','A set of instructions that tells a computer what to do.','We wrote a script for the game.'],['stage','เวที','The area where a Scratch project happens and sprites act.','The cat moved across the stage.'],['online community','ชุมชนออนไลน์','A group of people who interact and share ideas on the internet.','Our class has an online community.'],['account','บัญชีผู้ใช้งาน','Information used to log in to a website or app.','Keep your account password secret.'],['text','ข้อความ','Written words used to show information.','Add text to the top of the poster.'],['template','แบบสำเร็จรูป','A ready-made design used to create something.','Choose a template for your presentation.'],['safety','ความปลอดภัย','Being protected from danger.','Online safety is important.'],['personal information','ข้อมูลส่วนตัว','Information about you, such as your name or address.','Never share personal information with strangers.']]}
];
const all = subjects.flatMap(s => s.words.map((w,i)=>({subject:s.id, subjectName:s.name, icon:s.icon, tint:s.tint, no:i+1, word:w[0], thai:w[1], definition:w[2], example:w[3]})));
const state={view:'home', subject:'all', selected:0, quiz:[], qIndex:0, score:0, answered:false, misses:JSON.parse(localStorage.getItem('dq-misses')||'[]'), mastered:JSON.parse(localStorage.getItem('dq-mastered')||'[]')};
const app=document.querySelector('#app'); const shuffle=a=>[...a].sort(()=>Math.random()-.5); const esc=s=>s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function save(){localStorage.setItem('dq-misses',JSON.stringify(state.misses));localStorage.setItem('dq-mastered',JSON.stringify(state.mastered));updateProgress()}
function updateProgress(){const n=state.mastered.length;document.querySelector('#progressText').textContent=`${n} / 50 คำที่จำแล้ว`;document.querySelector('#progressBar').style.width=`${n/50*100}%`}
function setView(v){state.view=v;document.querySelectorAll('.pill').forEach(b=>b.classList.toggle('active',b.dataset.view===v)); if(v==='meaning'||v==='fill') startQuiz(v); render()}
function wordsFor(){return state.subject==='all'?all:all.filter(x=>x.subject===state.subject)}
function render(){ if(state.view==='home')home(); if(state.view==='learn')learn(); if(state.view==='meaning'||state.view==='fill')quiz(); if(state.view==='review')review(); updateProgress() }
function home(){app.innerHTML=`<div class="section-title"><div><h2>เลือกวิชาที่อยากเริ่ม</h2><p>วันละ 1 ชุด, 10 คำก็พอ แล้วค่อยทบทวนซ้ำ</p></div><button class="btn secondary" onclick="setView('meaning')">สุ่ม Quiz 10 ข้อ</button></div><div class="subject-grid">${subjects.map(s=>`<button class="subject" style="--tint:${s.tint}" onclick="state.subject='${s.id}';state.selected=0;setView('learn')"><span class="icon">${s.icon}</span><b>${s.name}</b><small>10 คำศัพท์</small></button>`).join('')}</div><div class="section-title" style="margin-top:34px"><div><h2>จำได้ยัง?</h2><p>เลือกคำตอบด้วยความหมายภาษาอังกฤษ เหมือนในข้อสอบ</p></div></div><div class="today" style="max-width:760px"><div class="day">✎</div><div><b>เคล็ดลับ: อ่าน definition ก่อนดูคำตอบ</b><p>ลองพูดคำตอบออกเสียง แล้วค่อยกดเลือก จะช่วยให้จำได้นานขึ้น</p></div></div>`}
function learn(){const list=wordsFor(); if(state.selected>=list.length)state.selected=0;const x=list[state.selected];app.innerHTML=`<div class="section-title"><div><h2>บัตรคำศัพท์</h2><p>${state.subject==='all'?'เลือกวิชาได้จากหน้าเริ่มเรียน':x.subjectName}</p></div><button class="btn secondary" onclick="state.subject='all';state.selected=0;setView('home')">เปลี่ยนวิชา</button></div><div class="study-layout"><aside class="word-list">${list.map((w,i)=>`<button class="${i===state.selected?'active':''}" onclick="state.selected=${i};render()"><em>${String(i+1).padStart(2,'0')}</em> ${esc(w.word)}</button>`).join('')}</aside><article class="flashcard" style="--tint:${x.tint}"><div class="card-content"><span class="category">${x.icon} ${x.subjectName}</span><h2 class="word">${esc(x.word)}</h2><div class="thai">${esc(x.thai)}</div><p class="definition">${esc(x.definition)}</p><p class="example">Example: <b>${esc(x.example)}</b></p><div class="card-actions"><button class="btn" onclick="speak('${x.word.replace(/'/g,"\\'")}')">🔊 ฟังคำอ่าน</button><button class="btn good" onclick="master('${x.word}')">✓ จำคำนี้แล้ว</button><button class="btn secondary" onclick="state.selected=(state.selected+1)%wordsFor().length;render()">คำถัดไป →</button></div></div></article></div>`}
function speak(word){if(!('speechSynthesis'in window))return alert('อุปกรณ์นี้ยังไม่รองรับการอ่านออกเสียง');speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(word);u.lang='en-US';u.rate=.75;speechSynthesis.speak(u)}
function master(word){if(!state.mastered.includes(word))state.mastered.push(word);state.misses=state.misses.filter(w=>w!==word);save();render()}
function startQuiz(type){const pool=wordsFor();state.quiz=shuffle(pool).slice(0,Math.min(10,pool.length)).map(x=>({...x, options:type==='meaning'?shuffle([x.definition,...shuffle(all.filter(y=>y.word!==x.word)).slice(0,3).map(y=>y.definition)]):shuffle([x.word,...shuffle(all.filter(y=>y.word!==x.word)).slice(0,3).map(y=>y.word)])}));state.qIndex=0;state.score=0;state.answered=false}
function quiz(){const q=state.quiz[state.qIndex]; if(!q){results();return} const type=state.view;const prompt=type==='meaning'?`Which definition matches <em>${esc(q.word)}</em>?`:`${esc(q.example.replace(q.word,'________'))}`;app.innerHTML=`<article class="quiz"><div class="quiz-meta"><span>${type==='meaning'?'เลือก English meaning':'เลือกคำศัพท์เติมประโยค'}</span><span>ข้อ ${state.qIndex+1} / ${state.quiz.length}</span></div><div class="question-label">${q.icon} ${q.subjectName}</div><h2 class="question">${prompt}</h2><div class="options">${q.options.map((o,i)=>`<button class="option" data-answer="${esc(o)}" onclick="answer(this,${i})"><b>${String.fromCharCode(65+i)}.</b> ${esc(o)}</button>`).join('')}</div><div class="feedback" id="feedback"></div><footer class="quiz-foot"><span class="score">คะแนน ${state.score}/${state.qIndex}</span><button id="next" class="btn" style="display:none" onclick="nextQuestion()">ข้อถัดไป →</button></footer></article>`}
function answer(btn){if(state.answered)return;state.answered=true;const q=state.quiz[state.qIndex];const correct=state.view==='meaning'?q.definition:q.word;const ok=btn.dataset.answer===correct;document.querySelectorAll('.option').forEach(b=>{b.disabled=true;if(b.dataset.answer===correct)b.classList.add('correct')});if(ok){state.score++;if(!state.mastered.includes(q.word))state.mastered.push(q.word);state.misses=state.misses.filter(w=>w!==q.word);save();document.querySelector('#feedback').textContent='ถูกต้อง! เก่งมาก ✨'}else{btn.classList.add('wrong');if(!state.misses.includes(q.word))state.misses.push(q.word);save();document.querySelector('#feedback').innerHTML=`ยังไม่ใช่ คำตอบคือ <b>${esc(q.word)}</b> = ${esc(q.thai)}`;}document.querySelector('#next').style.display='block';document.querySelector('.score').textContent=`คะแนน ${state.score}/${state.qIndex+1}`}
function nextQuestion(){state.qIndex++;state.answered=false;render()}
function results(){const total=state.quiz.length;const pct=Math.round(state.score/total*100);const msg=pct===100?'สมบูรณ์แบบ! พร้อมลุยข้อสอบแล้ว':pct>=70?'ทำได้ดีมาก ทบทวนคำที่พลาดอีกนิดเดียว':'ไม่เป็นไรเลย กลับไปทบทวนคำที่พลาด แล้วลองอีกครั้ง';app.innerHTML=`<article class="quiz results"><div class="result-mark">${pct>=70?'🏆':'🌱'}</div><h2>จบแล้ว!</h2><div class="result-score">${state.score}/${total}</div><p>${msg}</p><button class="btn" onclick="startQuiz(state.view);render()">ลองอีกครั้ง</button> <button class="btn secondary" onclick="setView('review')">ดูคำที่ต้องทบทวน</button></article>`}
function review(){const missed=all.filter(x=>state.misses.includes(x.word));const plan=[['1','Interactive English','10 คำ: climate ถึง tilt'],['2','Mathematics IEP','10 คำ: increasing order ถึง dividend'],['3','Social Studies IEP','10 คำ: geographical tool ถึง suburb'],['4','Science IEP','10 คำ: resemble ถึง expansion'],['5','Computing Science','10 คำ: order ถึง personal information'],['6','Mix & Match','ทำ Quiz 10 ข้อ, ทบทวนคำผิด'],['7','Final Challenge','สุ่ม Quiz จากทุกวิชาอีกครั้ง']];app.innerHTML=`<div class="section-title"><div><h2>แผน 7 วัน</h2><p>ทุกครั้งใช้เวลาเพียง 15-20 นาที แล้วหยุดพัก</p></div><button class="btn" onclick="state.subject='all';setView('meaning')">เริ่ม Mixed Quiz</button></div><div class="review"><section class="roadmap"><h3>เส้นทางก่อนวันสอบ</h3><div class="days">${plan.map(d=>`<div class="day-row"><b>${d[0]}</b><div><strong>${d[1]}</strong><br><span>${d[2]}</span></div><span>15-20 นาที</span></div>`).join('')}</div></section><aside class="weak-box"><h3>คำที่ควรทบทวน</h3>${missed.length?`<div class="weak-chips">${missed.map(x=>`<button onclick="state.subject=x.subject;state.selected=all.filter(y=>y.subject===x.subject).findIndex(y=>y.word===x.word);setView('learn')">${esc(x.word)}</button>`).join('')}</div>`:`<p class="empty">ยังไม่มีคำที่ตอบผิดเลย<br>เริ่มทำ Quiz แล้วระบบจะรวมคำที่ต้องกลับมาทบทวนไว้ตรงนี้</p>`}<hr style="border:0;border-top:1px solid var(--line);margin:22px 0"><button class="btn secondary" onclick="state.misses=[];save();render()">ล้างรายการทบทวน</button></aside></div>`}
document.querySelectorAll('.pill').forEach(b=>b.addEventListener('click',()=>setView(b.dataset.view)));render();
</script>
</body></html>
